name: Check labels

on:
  pull_request:
    # synchronize is required so that this workflow re-publishes its check
    # status on every new HEAD commit (including merges from main). Branch
    # protection evaluates required checks per commit SHA — without
    # synchronize, the check goes stale on push and blocks the merge gate
    # even though the labels themselves haven't changed.
    types: [opened, labeled, unlabeled, synchronize, ready_for_review]

permissions: read-all

concurrency:
  group: check-labels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  label-check:
    runs-on: ubuntu-latest
    if: github.base_ref == 'main' && github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: A Label (change type)
            enforced_labels: "A0-ui,A1-feature,A2-bugfix,A3-technical,D0-dependency"
          - test: B Label (urgency)
            enforced_labels: "B0-low-priority,B2-high-priority"
          - test: C Label (breaking changes)
            enforced_labels: "C0-breaks-nothing,C1-breaking-change"
    steps:
      - name: Label check (At least one of each type)
        run: |
          MATCH=$(jq -cn '${{ toJSON(github.event.pull_request.labels.*.name) }} as $USER_LABELS |
          ${{ toJSON(matrix.enforced_labels)  }} | split(",") as $LABELS |
          $USER_LABELS - ($USER_LABELS - $LABELS)')
          if [[  "$MATCH" == '[]' ]]; then
              exit 1
          fi
